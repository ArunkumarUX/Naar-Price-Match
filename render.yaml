services:
  - type: web
    name: naar-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run migrate:deploy
    startCommand: node dist/api/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: MIN_MATCH_CONFIDENCE
        value: "0.75"
      - key: MAX_PRICE_DEVIATION_PCT
        value: "5"
      - key: NAAR_BASE_URL
        value: https://naar.io
      - key: NAAR_SHOP_URL
        value: https://naar.io/shop
      - key: NAAR_CATALOG_API
        sync: false
      - key: NAAR_CATALOG_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app

  - type: worker
    name: naar-worker
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run migrate:deploy
    startCommand: node dist/jobs/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: MIN_MATCH_CONFIDENCE
        value: "0.75"
      - key: MAX_PRICE_DEVIATION_PCT
        value: "5"
      - key: NAAR_BASE_URL
        value: https://naar.io
      - key: NAAR_SHOP_URL
        value: https://naar.io/shop
      - key: NAAR_CATALOG_API
        sync: false
      - key: NAAR_CATALOG_API_KEY
        sync: false

  - type: redis
    name: naar-redis
    plan: free
    ipAllowList: []

databases:
  - name: naar-db
    plan: free
