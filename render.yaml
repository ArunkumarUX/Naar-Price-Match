services:
  - type: web
    name: naar-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma migrate resolve --rolled-back "0_init"; npm run migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: MIN_MATCH_CONFIDENCE
        value: "0.75"
      - key: MAX_PRICE_DEVIATION_PCT
        value: "5"
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app

  - type: redis
    name: naar-redis
    plan: free
    ipAllowList: []

databases:
  - name: naar-db
    plan: free
