services:
  - type: web
    name: naar-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      - key: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: USE_EMBEDDINGS
        value: "false"
      - key: MIN_MATCH_CONFIDENCE
        value: "0.45"
      - key: SKIP_SELLER_SCAN
        value: "true"
      - key: SELLER_SCAN_LIMIT
        value: "0"
      - key: MAX_PRICE_DEVIATION_PCT
        value: "5"
      - key: NAAR_BASE_URL
        value: https://naar.io
      - key: NAAR_SHOP_URL
        value: https://naar.io/shop
      - key: NAAR_CATALOG_API
        sync: false
      - key: NAAR_CATALOG_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://naar-price-monitor.vercel.app
      - key: CATALOG_SYNC_INTERVAL_MS
        value: "1800000"

  - type: worker
    name: naar-worker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c "npx prisma migrate deploy && node dist/jobs/worker.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      - key: PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: USE_EMBEDDINGS
        value: "false"
      - key: MIN_MATCH_CONFIDENCE
        value: "0.45"
      - key: SKIP_SELLER_SCAN
        value: "true"
      - key: SELLER_SCAN_LIMIT
        value: "0"
      - key: MAX_PRICE_DEVIATION_PCT
        value: "5"
      - key: NAAR_BASE_URL
        value: https://naar.io
      - key: NAAR_SHOP_URL
        value: https://naar.io/shop
      - key: NAAR_CATALOG_API
        sync: false
      - key: NAAR_CATALOG_API_KEY
        sync: false

  - type: redis
    name: naar-redis
    plan: free
    ipAllowList: []

databases:
  - name: naar-db
    plan: free
