services:
  - type: web
    name: naar-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run migrate:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2
      - key: MIN_MATCH_CONFIDENCE
        value: "0.75"
      - key: MAX_PRICE_DEVIATION_PCT
        value: "5"
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app

  - type: worker
    name: naar-worker
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: naar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: naar-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_MODEL
        value: Xenova/all-MiniLM-L6-v2

databases:
  - name: naar-db
    plan: starter

  - name: naar-redis
    type: redis
    plan: starter
