version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: naar_monitor
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "user"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports: ["6379:6379"]

  api:
    build: .
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: npm run worker:dev
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    depends_on: [postgres, redis]

  frontend:
    build: ./frontend
    command: npm run dev -- -H 0.0.0.0 -p 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [api]

volumes:
  postgres_data:
